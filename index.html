<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coentro | Links Oficiais</title>
    <meta
      name="description"
      content="Links oficiais do restaurante Coentro: pedidos, redes sociais e card&aacute;pio virtual."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Nunito+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="bg-layer" aria-hidden="true">
      <span class="leaf leaf-1"></span>
      <span class="leaf leaf-2"></span>
      <span class="leaf leaf-3"></span>
    </div>

    <main class="page-wrap">
      <header class="site-header">
        <img src="images/logo.png" alt="Logo do restaurante Coentro" class="logo" />
      </header>

      <section id="public-view" class="card" aria-label="Links principais do restaurante">
        <div id="link-list" class="link-list"></div>
      </section>

      <section id="admin-view" class="card hidden" aria-label="Painel de administrador">
        <form id="admin-form" class="admin-panel" autocomplete="off">
          <div id="admin-fields" class="admin-fields"></div>
          <button type="submit" class="save-btn">Salvar altera&ccedil;&otilde;es</button>
        </form>
      </section>

      <footer class="footer-nav"></footer>
    </main>

    <div id="auth-modal" class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-title">
      <div class="auth-card">
        <h2 id="auth-title">Acesso restrito</h2>
        <p class="auth-subtitle">Digite a senha</p>
        <form id="auth-form" class="auth-form" autocomplete="off">
          <label for="auth-password" class="sr-only">Senha de administrador</label>
          <input id="auth-password" class="auth-input" type="password" placeholder="Senha" required />
          <p id="auth-error" class="auth-error" role="alert" aria-live="assertive"></p>
          <div class="auth-actions">
            <button type="submit" class="auth-btn auth-btn-primary">Entrar</button>
            <button id="auth-cancel" type="button" class="auth-btn auth-btn-secondary">Cancelar</button>
          </div>
        </form>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  </body>
</html>
